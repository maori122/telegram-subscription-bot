name = "telegram-bot"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV namespace для хранения данных
[[kv_namespaces]]
binding = "USERS"
id = "your_kv_namespace_id"

# Переменные окружения (будут настроены через wrangler secret)
[vars]
# BOT_TOKEN и ADMIN_PASSWORD будут добавлены как секреты
